<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NotaryPro</title>
  <meta name="description" content="Log in to your NotaryPro client account to manage appointments and documents." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z'/><path d='m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z'/><path d='M7 21h10'/><path d='M12 3v18'/><path d='M3 7h2c2 0 4-1.34 4-4V3h8v.006A6.42 6.42 0 0 1 18.5 7H21'/></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="auth.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="main.js" defer></script>
</head>
<body class="auth-body">

<!-- Toggles top-right -->
<div class="auth-toggles">
  <button class="toggle-btn" id="theme-toggle-auth" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
  <button class="toggle-btn" id="rtl-toggle-auth" aria-label="Toggle RTL">RTL</button>
</div>

<div class="auth-card">
  <!-- Logo -->
  <a href="index.html" class="auth-logo" style="text-decoration:none;transition:var(--transition-fast);">
    <div class="logo-icon"><i data-lucide="scale"></i></div>
    <span class="logo-text">NotaryPro</span>
  </a>

  <div class="auth-title">
    <h1>Welcome Back</h1>
    <p>Sign in to your client account</p>
  </div>

  <form id="login-form" novalidate>
    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="login-email">Email Address</label>
      <div class="input-with-icon">
        <span class="input-prefix-icon"><i data-lucide="mail"></i></span>
        <input class="form-input" id="login-email" type="email" placeholder="you@email.com" required autocomplete="email" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="login-password">Password</label>
      <div class="input-wrapper input-with-icon">
        <span class="input-prefix-icon"><i data-lucide="lock"></i></span>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" style="padding-left:40px;" />
        <button type="button" class="input-icon-btn toggle-pw" aria-label="Toggle password visibility">
          <i data-lucide="eye"></i>
        </button>
      </div>
    </div>

    <!-- Remember / Forgot -->
    <div class="auth-row" style="margin-bottom: 24px;">
      <label class="checkbox-label">
        <input type="checkbox" id="remember-me" />
        Remember me
      </label>
      <a href="#" class="forgot-link">Forgot Password?</a>
    </div>

    <!-- Login Button -->
    <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-bottom:16px;">
      <i data-lucide="log-in"></i> Sign In
    </button>
  </form>

  <!-- Divider -->
  <div class="auth-divider"><span>or continue with</span></div>

  <!-- Social Login -->
  <div class="social-login-grid">
    <button class="social-btn" type="button">
      <svg class="google-icon" viewBox="0 0 24 24" fill="currentColor" width="19" height="19"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="social-btn" type="button">
      <svg class="apple-icon" viewBox="0 0 24 24" fill="currentColor" width="19" height="19"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Apple
    </button>
  </div>

  <div class="auth-footer" style="margin-top:24px;">
    Don't have an account? <a href="register.html">Create account</a>
  </div>
  
</div>

</body>
</html>
